name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt || true
      
      - name: Run tests
        run: |
          echo "No tests yet - skills are MCP servers"
          exit 0
  
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        run: |
          uv pip install --system black flake8 || true
      
      - name: Run linter
        run: |
          black --check skills/ || true
          flake8 skills/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
  
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate Skills Structure
        run: |
          echo "Validating skills structure..."
          for skill in skills/*/; do
            if [ -d "$skill" ]; then
              echo "✓ Checking $skill"
              if [ ! -f "${skill}SKILL.md" ]; then
                echo "⚠ Warning: ${skill}SKILL.md not found"
              fi
            fi
          done
          echo "Validation complete!"
      
      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          if grep -r "sk-" skills/ --include="*.py" | grep -v "__pycache__"; then
            echo "⚠ Warning: Potential API keys found"
            exit 0
          else
            echo "✓ No hardcoded secrets found"
          fi
